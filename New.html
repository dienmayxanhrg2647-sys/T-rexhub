<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encrypt PRO + Moonsec</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}
.box{
width:450px;
padding:20px;
background:#111827;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,.5);
}
h2{text-align:center;margin-bottom:10px}
textarea,select,input,button{
width:100%;
margin-bottom:10px;
padding:10px;
border-radius:8px;
border:none;
}
textarea{height:100px;resize:none}
button{
background:#2563eb;
color:white;
cursor:pointer;
}
button:hover{background:#1d4ed8}
.result{
background:#0b1220;
padding:10px;
border-radius:8px;
min-height:80px;
word-break:break-word;
font-size:13px;
}
.hidden{display:none}
</style>
</head>
<body>

<div class="box">
<h2>🔐 Encrypt PRO + Moonsec</h2>

<textarea id="input" placeholder="Nhập code hoặc text..."></textarea>

<select id="method">
<option value="aes">AES-256</option>
<option value="base64">Base64</option>
<option value="caesar">Caesar</option>
<option value="reverse">Reverse</option>
<option value="moonsec">🔥 Moonsec V2</option>
</select>

<input type="password" id="password" placeholder="Mật khẩu AES">
<input type="number" id="shift" value="3" class="hidden">

<button onclick="encrypt()">Mã Hoá</button>
<button onclick="decrypt()">Giải Mã</button>

<div class="result" id="output"></div>
</div>

<script>
const input=document.getElementById("input");
const method=document.getElementById("method");
const password=document.getElementById("password");
const shiftInput=document.getElementById("shift");
const output=document.getElementById("output");

method.addEventListener("change",()=>{
password.classList.add("hidden");
shiftInput.classList.add("hidden");
if(method.value==="aes") password.classList.remove("hidden");
if(method.value==="caesar") shiftInput.classList.remove("hidden");
});

// ===== Basic Encode =====
function encodeBase64(str){return btoa(unescape(encodeURIComponent(str)));}
function decodeBase64(str){return decodeURIComponent(escape(atob(str)));}

function caesar(str,shift){
return str.replace(/[A-Za-z]/g,c=>{
let base=c<='Z'?65:97;
return String.fromCharCode((c.charCodeAt(0)-base+shift+26)%26+base);
});
}

// ===== AES =====
async function getKey(pass){
const enc=new TextEncoder();
const keyMaterial=await crypto.subtle.importKey("raw",enc.encode(pass),"PBKDF2",false,["deriveKey"]);
return crypto.subtle.deriveKey(
{name:"PBKDF2",salt:enc.encode("salt"),iterations:100000,hash:"SHA-256"},
keyMaterial,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
}

async function aesEncrypt(text,pass){
const enc=new TextEncoder();
const iv=crypto.getRandomValues(new Uint8Array(12));
const key=await getKey(pass);
const encrypted=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,enc.encode(text));
return btoa(String.fromCharCode(...iv,...new Uint8Array(encrypted)));
}

async function aesDecrypt(text,pass){
try{
const data=Uint8Array.from(atob(text),c=>c.charCodeAt(0));
const iv=data.slice(0,12);
const encrypted=data.slice(12);
const key=await getKey(pass);
const decrypted=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,encrypted);
return new TextDecoder().decode(decrypted);
}catch{return "Sai mật khẩu hoặc dữ liệu!";}
}

// ===== Moonsec V2 =====
function moonsecEncode(code){

// Layer 1 Base64
let base=btoa(code);

// Layer 2 Reverse
let rev=base.split("").reverse().join("");

// Layer 3 Hex encode
let hex="";
for(let i=0;i<rev.length;i++){
hex+=rev.charCodeAt(i).toString(16);
}

// Junk
let junk1=Math.random().toString(36).substring(2,8);
let junk2=Math.random().toString(36).substring(2,8);

return `(function(){
var _0x${junk1}="${junk2}";
var _0xdata="${hex}";
var _0xstr="";
for(var i=0;i<_0xdata.length;i+=2){
_0xstr+=String.fromCharCode(parseInt(_0xdata.substr(i,2),16));
}
_0xstr=_0xstr.split("").reverse().join("");
eval(atob(_0xstr));
})();`;
}

// ===== MAIN =====
async function encrypt(){
let text=input.value;
if(!text) return;
let result="";

if(method.value==="aes"){
if(!password.value) return alert("Nhập mật khẩu!");
result=await aesEncrypt(text,password.value);
}
else if(method.value==="base64"){result=encodeBase64(text);}
else if(method.value==="caesar"){result=caesar(text,parseInt(shiftInput.value)||0);}
else if(method.value==="reverse"){result=text.split("").reverse().join("");}
else if(method.value==="moonsec"){result=moonsecEncode(text);}

output.innerText=result;
}

async function decrypt(){
let text=input.value;
if(!text) return;
let result="";

if(method.value==="aes"){
if(!password.value) return alert("Nhập mật khẩu!");
result=await aesDecrypt(text,password.value);
}
else if(method.value==="base64"){
try{result=decodeBase64(text);}catch{result="Sai Base64!";}
}
else if(method.value==="caesar"){result=caesar(text,-(parseInt(shiftInput.value)||0));}
else if(method.value==="reverse"){result=text.split("").reverse().join("");}
else{result="Moonsec không hỗ trợ giải mã tự động.";}

output.innerText=result;
}
</script>

</body>
</html>
